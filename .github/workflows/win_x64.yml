name: Build for Windows x64

on:
  workflow_call:
    inputs:
      tag:
        description: "tag"
        required: false
        default: ""
        type: string
  workflow_dispatch:

jobs:
  build-windows-app:
    name: Release Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Apply Patch
        shell: pwsh
        run: lib/scripts/patch.ps1 windows

      - name: Add fastforge and Inno Setup
        run: |
          dart pub global activate fastforge
          choco install innosetup

      - name: Add Chinese language file for Inno Setup
        run: |
          Copy-Item "windows/packaging/exe/ChineseSimplified.isl" "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
        shell: pwsh

      - name: Set and Extract version
        shell: pwsh
        run: lib/scripts/build.ps1

      - name: Build Windows
        shell: pwsh
        run: |
          $maxAttempts = 3

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Windows package attempt $attempt of $maxAttempts"
            fastforge package --platform windows --targets exe --flutter-build-args="dart-define-from-file=pili_release.json"
            $exitCode = $LASTEXITCODE

            if ($exitCode -eq 0) {
              exit 0
            }
            if ($attempt -eq $maxAttempts) {
              exit $exitCode
            }

            Write-Warning "Windows packaging failed with exit code $exitCode; clearing downloaded archives before retrying."
            Remove-Item "build/windows/x64/*.7z" -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds (15 * $attempt)
          }

      - name: Prepare Upload
        run: |
          mkdir -p Release/PiliMax-Win
          mkdir -p PiliMax-Win-Setup
          mv build/windows/x64/runner/Release/* Release/PiliMax-Win/
          mv dist/**/*.exe PiliMax-Win-Setup/PiliMax_windows_${{env.version}}_x64_setup.exe

      - name: Compress
        run: |
          Compress-Archive -Path "Release/PiliMax-Win" -DestinationPath "PiliMax_windows_${{env.version}}_x64_portable.zip"
        shell: pwsh

      - name: Release
        if: ${{ github.event.inputs.tag != '' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          files: |
            PiliMax_windows_*.zip
            PiliMax-Win-Setup/PiliMax_windows_*.exe

      - name: Upload windows file release
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Windows-file-x64-release
          path: PiliMax_windows_*.zip

      - name: Upload windows setup release
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: Windows-setup-x64-release
          path: PiliMax-Win-Setup/PiliMax_windows_*.exe
