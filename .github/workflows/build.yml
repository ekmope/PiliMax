name: Build

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
        paths-ignore:
            - "**.md"
    workflow_dispatch:
        inputs:
            build_android:
                description: "Build Android"
                required: false
                default: true
                type: boolean

            build_ios:
                description: "Build iOS"
                required: false
                default: true
                type: boolean

            build_mac:
                description: "Build Mac"
                required: false
                default: true
                type: boolean

            build_win_x64:
                description: "Build Win-x64"
                required: false
                default: true
                type: boolean

            build_linux_x64:
                description: "Build Linux-x64"
                required: false
                default: true
                type: boolean

            tag:
                description: "tag"
                required: false
                default: ""
                type: string

jobs:
    android:
        if: ${{ (github.event_name == 'pull_request' && github.repository == 'ekmope/PiliMax') || github.event.inputs.build_android == 'true' }}
        name: Release Android
        runs-on: ubuntu-latest
        permissions: write-all

        steps:
            - name: 代码迁出
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: 构建Java环境
              uses: actions/setup-java@v5
              with:
                  distribution: "zulu"
                  java-version: "17"
                  cache: "gradle"
                  cache-dependency-path: |
                      android/*.gradle*
                      android/**/gradle-wrapper.properties

            - name: 安装Flutter
              uses: subosito/flutter-action@v2
              id: flutter-action
              with:
                  channel: stable
                  flutter-version-file: pubspec.yaml
                  cache: true

            - name: Validate setting defaults
              run: dart tool/check_setting_bool_defaults.dart

            - name: Apply Patch
              shell: pwsh
              run: lib/scripts/patch.ps1 android

            - name: Write key
              if: github.event_name == 'workflow_dispatch'
              shell: bash
              env:
                  SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
                  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
                  KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
                  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
              run: |
                  set -euo pipefail
                  if [ -z "$SIGN_KEYSTORE_BASE64" ] || [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
                    echo "::error::Missing Android signing secrets. Configure SIGN_KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS and KEY_PASSWORD in GitHub repository secrets."
                    exit 1
                  fi
                  printf '%s' "$SIGN_KEYSTORE_BASE64" | base64 --decode > android/app/key.jks
                  python3 - <<'PY'
                  import os
                  from pathlib import Path

                  def escape_property(value: str) -> str:
                      escaped = []
                      for char in value:
                          code = ord(char)
                          if char == '\\':
                              escaped.append('\\\\')
                          elif char == '\t':
                              escaped.append('\\t')
                          elif char == '\n':
                              escaped.append('\\n')
                          elif char == '\r':
                              escaped.append('\\r')
                          elif char == '\f':
                              escaped.append('\\f')
                          elif char in ' =:#!':
                              escaped.append('\\' + char)
                          elif 0x20 <= code <= 0x7e:
                              escaped.append(char)
                          elif code <= 0xffff:
                              escaped.append(f'\\u{code:04x}')
                          else:
                              code -= 0x10000
                              escaped.append(f'\\u{0xd800 + (code >> 10):04x}')
                              escaped.append(f'\\u{0xdc00 + (code & 0x3ff):04x}')
                      return ''.join(escaped)

                  properties = {
                      'storeFile': 'key.jks',
                      'storePassword': os.environ['KEYSTORE_PASSWORD'],
                      'keyAlias': os.environ['KEY_ALIAS'],
                      'keyPassword': os.environ['KEY_PASSWORD'],
                  }
                  content = ''.join(
                      f'{key}={escape_property(value)}\n'
                      for key, value in properties.items()
                  )
                  Path('android/key.properties').write_text(content, encoding='ascii')
                  PY

            - name: Set and Extract version
              if: ${{ github.event_name == 'workflow_dispatch' }}
              shell: pwsh
              run: lib/scripts/build.ps1 android

            - name: Flutter Build Release Apk
              if: ${{ github.event_name == 'workflow_dispatch' }}
              run: flutter build apk --release --split-per-abi --dart-define-from-file=pili_release.json --pub

            - name: Flutter Build Dev Apk
              if: ${{ github.event_name == 'pull_request' }}
              run: |
                  flutter build apk --release --split-per-abi --android-project-arg dev=1 --pub

            - name: Rename
              run: |
                  for file in build/app/outputs/flutter-apk/app-*-release.apk; do
                    abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
                    mv "$file" "PiliMax_android_${{ env.version }}_${abi}.apk"
                  done
              shell: bash

            - name: Release
              if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ github.event.inputs.tag }}
                  name: ${{ github.event.inputs.tag }}
                  files: PiliMax_android_*.apk

            - name: 上传
              uses: actions/upload-artifact@v7
              with:
                  archive: false
                  name: Android_arm64-v8a
                  path: PiliMax_android_*_arm64-v8a.apk

            - name: 上传
              uses: actions/upload-artifact@v7
              with:
                  archive: false
                  name: Android_armeabi-v7a
                  path: PiliMax_android_*_armeabi-v7a.apk

            - name: 上传
              uses: actions/upload-artifact@v7
              with:
                  archive: false
                  name: Android_x86_64
                  path: PiliMax_android_*_x86_64.apk

    ios:
        if: ${{ (github.event_name == 'pull_request' && github.repository == 'ekmope/PiliMax') || github.event.inputs.build_ios == 'true' }}
        uses: ./.github/workflows/ios.yml
        permissions: write-all
        with:
            tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

    mac:
        if: ${{ github.event.inputs.build_mac == 'true' }}
        uses: ./.github/workflows/mac.yml
        permissions: write-all
        with:
            tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

    win_x64:
        if: ${{ (github.event_name == 'pull_request' && github.repository == 'ekmope/PiliMax') || github.event.inputs.build_win_x64 == 'true' }}
        uses: ./.github/workflows/win_x64.yml
        permissions: write-all
        with:
            tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

    linux_x64:
        if: ${{ github.event.inputs.build_linux_x64 == 'true' }}
        uses: ./.github/workflows/linux_x64.yml
        permissions: write-all
        with:
            tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}
